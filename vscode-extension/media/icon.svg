<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circle background -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Lightning bolt (AgentY logo) -->
  <path d="M 75 25 L 50 65 L 60 65 L 53 103 L 78 63 L 68 63 Z" 
        fill="white" 
        stroke="white" 
        stroke-width="2" 
        stroke-linejoin="round"/>
  
  <!-- Subtle circuit pattern -->
  <circle cx="35" cy="35" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="93" cy="35" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="35" cy="93" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="93" cy="93" r="3" fill="rgba(255,255,255,0.3)"/>
  
  <line x1="35" y1="35" x2="50" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="93" y1="35" x2="78" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="35" y1="93" x2="50" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="93" y1="93" x2="78" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
</svg>
